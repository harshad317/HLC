# Real locuslab/TOFU, 10% forget split (~400 forget items). Largest scale lane.
# Generate the referenced files with:
#   scripts/prepare_tofu.py --source tofu --forget_fraction 0.10 --output_dir data/tofu_real
#   scripts/make_prompt_variants.py --forget_file data/tofu_real/forget_10.jsonl --output data/tofu_real/forget_prompt_variants_10.jsonl
#   scripts/make_relearn_pools.py --retain_file data/tofu_real/retain_10.jsonl --output_dir data/tofu_real/relearn_pools_10
#   scripts/make_heldout_stress_relearn_pools.py --forget_file data/tofu_real/forget_10.jsonl --output_dir data/tofu_real/relearn_pools_10 --variants_per_item 3
forget_file: data/tofu_real/forget_10.jsonl
retain_file: data/tofu_real/retain_10.jsonl
prompt_variants: data/tofu_real/forget_prompt_variants_10.jsonl
relearn_pools:
  retain_adjacent: data/tofu_real/relearn_pools_10/retain_adjacent.jsonl
  synthetic_biography: data/tofu_real/relearn_pools_10/synthetic_biography.jsonl
  syntax_matched: data/tofu_real/relearn_pools_10/syntax_matched.jsonl
  random_general: data/tofu_real/relearn_pools_10/random_general.jsonl
