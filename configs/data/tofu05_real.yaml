# Real locuslab/TOFU, 5% forget split (~200 forget items). Benchmark lane (final table).
# Generate the referenced files with:
#   scripts/prepare_tofu.py --source tofu --forget_fraction 0.05 --output_dir data/tofu_real
#   scripts/make_prompt_variants.py --forget_file data/tofu_real/forget_05.jsonl --output data/tofu_real/forget_prompt_variants_05.jsonl
#   scripts/make_relearn_pools.py --retain_file data/tofu_real/retain_05.jsonl --output_dir data/tofu_real/relearn_pools_05
#   scripts/make_heldout_stress_relearn_pools.py --forget_file data/tofu_real/forget_05.jsonl --output_dir data/tofu_real/relearn_pools_05 --variants_per_item 3
forget_file: data/tofu_real/forget_05.jsonl
retain_file: data/tofu_real/retain_05.jsonl
prompt_variants: data/tofu_real/forget_prompt_variants_05.jsonl
relearn_pools:
  retain_adjacent: data/tofu_real/relearn_pools_05/retain_adjacent.jsonl
  synthetic_biography: data/tofu_real/relearn_pools_05/synthetic_biography.jsonl
  syntax_matched: data/tofu_real/relearn_pools_05/syntax_matched.jsonl
  random_general: data/tofu_real/relearn_pools_05/random_general.jsonl
