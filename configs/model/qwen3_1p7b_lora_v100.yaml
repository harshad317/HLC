model_name: Qwen/Qwen3-1.7B
# fp32 for training stability at 1.7B (fp16 overflows to NaN under aggressive
# unlearning). Single-model methods (GA, displacement) fit in 16GB; HLC, which keeps
# a second frozen model, does not -- use METHODS="ga displacement" for this lane.
dtype: float32
device: null
lora:
  enabled: true
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
train:
  steps: 300
  batch_size: 1
  lr: 0.00002
  max_length: 160
  max_grad_norm: 1.0
