lambda0: 1.0
lambdaK: 2.0
lambdaR: 2.0
lambdaG: 0.1
lambda_margin_growth: 0.5
margin_growth_target: 1.0
sharpness_rho: 0.0
lambda_sharpness: 0.0
gamma: 0.1
beta: 0.1
neutral_answer: "I don't know."
kl_top_k: 64
max_length: 192
